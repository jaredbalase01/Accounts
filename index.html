      body{background-image:url("a.jpg");background-position: 60% 0%} 
      div{background-image:url("green.jpg");background-position:0% 10%;border-radius:30px;margin:10px 30px;animation: blink-shadow 1s infinite alternate;} 
      @keyframes blink-shadow {
            0% {
                box-shadow: 0 0 0px rgba(0, 0, 0, 0);
            }
            10%{
                box-shadow: 0px 0px 30px 1px violet;
            }
            20%{
                box-shadow: 0px 0px 30px 1px blue;
            }
            30%{
                box-shadow: 0px 0px 30px 1px green;
            }
            40%{
                box-shadow: 0px 0px 30px 1px white;
            }
            50%{
                box-shadow: 0px 0px 30px 1px black;
            }
            60%{
                box-shadow: 0px 0px 30px 1px red;
            }
            70%{
                box-shadow: 0px 0px 30px 1px orange;
            }
            80%{
                box-shadow: 0px 0px 30px 1px grey;
            }
            90%{
                box-shadow: 0px 0px 30px 1px none;
            }
            100% {
                
                box-shadow: 0px 0px 30px 1px yellow;
            }} 
          div:hover{background-position:10% 100%}
          div:active{
              background-position:10% 60%;
          }
